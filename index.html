// ===================== GAUGE CARD =====================
// Renderiza um cartão com um velocímetro/rosca representando as horas lançadas
// no mês em comparação com a carga teórica (8h × dias trabalhados). As
// porções correspondem às horas de operação, horas de manutenção e horas
// restantes até a carga teórica. O gráfico é desenhado com Chart.js.
function renderGaugeCard(b){
  // Estrutura da gauge baseada em HTML/CSS sem dependências externas. O elemento .arc recebe as variáveis CSS
  // --theta1, --theta2 e --angle para controlar as porções e o ponteiro. Uma marca de horas úteis será calculada no drawGauge().
  return '<div class="card" style="margin-top:16px"><h3>Resumo de horas no mês <span style=\"display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--surface-3);color:var(--text-mute);font-size:10px;font-weight:700;margin-left:8px;cursor:help;vertical-align:middle\" title=\"Velocímetro mostra o preenchimento das horas do mês. Arco azul = horas operacionais (OPER). Arco roxo = horas de manutenção. Agulha branca = total de horas lançadas. Marcador tracejado = meta de horas úteis (dias × 7h). 100%% corresponde à carga nominal de 8h × dias com lançamento.\">?</span></h3><div class="card-sub">Horas lançadas vs carga teórica</div><div class="gauge-wrap"><div class="gauge" id="gaugeChart"><div class="arc"></div><div class="needle"></div><div class="marker"></div><div class="labels"></div></div></div></div>';
}

function drawGauge(b){
  function polarToXY(cx,cy,r,deg){
    const rad=(deg-180)*Math.PI/180;
    return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
  }
  function arcPath(cx,cy,r,startDeg,endDeg){
    if(Math.abs(endDeg-startDeg)<0.01) return "";
    const s=polarToXY(cx,cy,r,startDeg);
    const e=polarToXY(cx,cy,r,endDeg);
    const large=(endDeg-startDeg)>180?1:0;
    return`M${s.x.toFixed(2)},${s.y.toFixed(2)} A${r},${r} 0 ${large},1 ${e.x.toFixed(2)},${e.y.toFixed(2)}`;
  }
  const cx=130,cy=140,r=108;
  const dias=b.dias_trabalhados||0;
  const max=dias*8||1;
  const oper=b.horas_oper||0;
  const manut=b.horas_manut||0;
  const total=oper+manut;
  const pct=Math.round((total/max)*100);
  const uteis=dias*7;
  const dOper=Math.min(179.9,(oper/max)*180);
  const dManut=Math.min(179.9,((oper+manut)/max)*180);
  const dMark=Math.min(179.9,(uteis/max)*180);
  const dNeedl=Math.min(179.9,(total/max)*180);
  const track=document.getElementById('gTrack');
  if(!track) return;
  track.setAttribute('d',arcPath(cx,cy,r,0,180));
  const gOp=document.getElementById('gOp');
  const gMn=document.getElementById('gMn');
  const gMark=document.getElementById('gMark');
  const needle=document.getElementById('gNeedle');
  const pin=document.getElementById('gPin');
  if(gOp) gOp.setAttribute('d',dOper>0.1?arcPath(cx,cy,r,0,dOper):'');
  if(gMn) gMn.setAttribute('d',dManut>dOper+0.1?arcPath(cx,cy,r,dOper,dManut):'');
  if(gMark){
    const mIn=polarToXY(cx,cy,r-20,dMark);
    const mOut=polarToXY(cx,cy,r+10,dMark);
    gMark.setAttribute('x1',mIn.x.toFixed(1));gMark.setAttribute('y1',mIn.y.toFixed(1));
    gMark.setAttribute('x2',mOut.x.toFixed(1));gMark.setAttribute('y2',mOut.y.toFixed(1));
  }
  if(needle){
    const nTip=polarToXY(cx,cy,r+14,dNeedl);
    const nBase=polarToXY(cx,cy,12,dNeedl);
    needle.setAttribute('x1',nBase.x.toFixed(1));needle.setAttribute('y1',nBase.y.toFixed(1));
    needle.setAttribute('x2',nTip.x.toFixed(1));needle.setAttribute('y2',nTip.y.toFixed(1));
  }
  if(pin){pin.setAttribute('cx',cx);pin.setAttribute('cy',cy);}
  const corPct=pct>=100?'#22c55e':(pct>=80?'#f59e0b':'#ef4444');
  const gPctEl=document.getElementById('gPct');
  const gTotEl=document.getElementById('gTotal');
  const gMaxEl=document.getElementById('gMax');
  const legOp=document.getElementById('gLegOp');
  const legMn=document.getElementById('gLegMn');
  if(gPctEl){gPctEl.textContent=pct+'%';gPctEl.setAttribute('fill',corPct);}
  if(gTotEl) gTotEl.textContent=fmtNum(total)+'h / '+fmtNum(max)+'h';
  if(gMaxEl) gMaxEl.textContent=fmtNum(max)+'h';
  if(legOp) legOp.textContent='OPER — '+fmtNum(oper)+'h';
  if(legMn) legMn.textContent='MANUT — '+fmtNum(manut)+'h';
}

// ===================== DATE FILTER =====================
// Associa eventos aos campos de data e botão de aplicar. Define os
// valores no estado global e re-renderiza a interface quando o usuário
// aplica o filtro. Valores existentes são preservados nas caixas.
function bindDateFilter(){
  const s = document.getElementById('startDate');
  const e = document.getElementById('endDate');
  const btn = document.getElementById('applyDateFilter');
  if(!s || !e || !btn) return;
  // Pré-preencher as datas com valores existentes
  if(state.startDate) s.value = state.startDate;
  if(state.endDate) e.value = state.endDate;
  // Aplicar filtro: salva valores e re-renderiza
  btn.onclick = function(){
    state.startDate = s.value ? s.value : null;
    state.endDate   = e.value ? e.value : null;
    render();
  };
  // Limpar filtro: remove datas e re-renderiza
  const clearBtn = document.getElementById('clearDateFilter');
  if(clearBtn){
    clearBtn.onclick = function(){
      state.startDate = null;
      state.endDate   = null;
      s.value = '';
      e.value = '';
      render();
    };
  }
}

// ===================== COPY BUTTONS =====================
// Percorre todos os elementos com classe copy-btn e atribui evento de clique
// para copiar o valor associado no atributo data-copy. Exibe toast de
// confirmação ou erro conforme o resultado da operação.
function bindCopyButtons(){
  const btns = document.querySelectorAll('.copy-btn');
  btns.forEach(btn => {
    btn.onclick = async function(){
      const val = btn.getAttribute('data-copy') || '';
      try{
        await navigator.clipboard.writeText(val);
        showToast('Informação copiada','success');
      }catch(err){
        // Fallback para navegadores que não suportam navigator.clipboard (ex: HTTP sem HTTPS)
        try{
          const ta=document.createElement('textarea');
          ta.style.position='fixed';
          ta.style.opacity='0';
          ta.value=val;
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok=document.execCommand('copy');
          document.body.removeChild(ta);
          if(ok){
            showToast('Informação copiada','success');
          }else{
            showToast('Falha ao copiar','error');
          }
        }catch(err2){
          console.error('Erro ao copiar:',err,err2);
          showToast('Falha ao copiar','error');
        }
      }
    };
  });
}

// ===================== OS RICH TOOLTIP =====================
const osRichTip = document.getElementById('osRichTip');
let osRichTimer = null;

function statusClass(st){
  if(!st) return '';
  const s = st.toLowerCase();
  if(s.includes('conclu')) return 'st-concluida';
  if(s.includes('andamento')) return 'st-andamento';
  if(s.includes('aprovad')) return 'st-aprovada';
  if(s.includes('aguard')) return 'st-aguardando';
  if(s.includes('program')) return 'st-programada';
  return '';
}

function buildRichTip(lista, tipo, cor){
  if(!lista||!lista.length) return null;
  const det = DATA.os_details || {};
  let rows = lista.slice(0,12).map(osn => {
    const d = det[String(osn)] || {};
    const desc = d.desc || d.descricao || '—';
    const loc  = d.local || d.site || '—';
    const st   = d.status || d.situacao || '—';
    const sc   = statusClass(st);
    return '<div class="os-rich-tip-row">'
      +'<span class="os-num">'+osn+'</span>'
      +'<div><div class="os-desc">'+desc+'</div><div class="os-loc">'+loc+'</div></div>'
      +'<span class="os-st '+sc+'">'+st+'</span>'
    +'</div>';
  }).join('');
  const extra = lista.length > 12 ? lista.length - 12 : 0;
  const copyFmt = lista.map((n,i)=>i===0?String(n):',='+String(n)).join('');
  return '<div class="os-rich-tip-head">'
      +'<span style="width:8px;height:8px;border-radius:2px;background:'+cor+';display:inline-block"></span>'
      +'<span>'+tipo+'</span>'
      +'<span style="margin-left:auto;font-size:10px;color:var(--text-dim)">'+lista.length+' OS</span>'
    +'</div>'
    + rows
    +(extra?'<div style="font-size:10px;color:var(--text-dim);padding:4px 0">... e mais '+extra+' OS</div>':'')
    +'<div class="os-rich-tip-foot">'
      +'<span>Clique em 📋 para copiar no formato <code style="background:var(--surface-3);padding:1px 4px;border-radius:3px">Nº,=Nº</code></span>'
      +'<span style="color:var(--text-mute)">'+lista.length+' registros</span>'
    +'</div>';
}

function placeRichTip(e){
  if(!osRichTip) return;
  const tw=osRichTip.offsetWidth,th=osRichTip.offsetHeight;
  let x=e.clientX+16,y=e.clientY-th/2;
  if(x+tw>window.innerWidth-16) x=e.clientX-tw-16;
  if(y<8) y=8;
  if(y+th>window.innerHeight-8) y=window.innerHeight-th-8;
  osRichTip.style.left=x+'px';
  osRichTip.style.top=y+'px';
}

function bindOSTooltips(){
  // Botões .os-tip-btn (nos bd-row e os-item)
  document.querySelectorAll('.os-tip-btn').forEach(btn=>{
    btn.addEventListener('mouseenter', e=>{
      const tipo = btn.closest('[data-type]')?.dataset.type || '';
      const bRow = btn.closest('.bd-row,.os-item');
      const cor  = bRow?.querySelector('.swatch,.dot')?.style.background || 'var(--op)';
      // Buscar lista de OS do contexto atual
      const b = DATA.dados[state.mes] && DATA.dados[state.mes][state.operador];
      if(!b) return;
      const lista = (b.os_lists && b.os_lists[tipo]) ? b.os_lists[tipo] : [];
      const content = buildRichTip(lista, tipo, cor);
      if(!content) return;
      osRichTip.innerHTML = content;
      osRichTip.classList.add('show');
      placeRichTip(e);
    });
    btn.addEventListener('mousemove', placeRichTip);
    btn.addEventListener('mouseleave', ()=>osRichTip.classList.remove('show'));
  });
}

function bindOSItemTooltips(){
  // os-item no painel de OS por tipo — hover abre tooltip rico
  document.querySelectorAll('.os-item').forEach(item=>{
    const tipo = item.dataset.type || '';
    item.addEventListener('mouseenter', e=>{
      const b = DATA.dados[state.mes] && DATA.dados[state.mes][state.operador];
      if(!b) return;
      const lista = (b.os_lists && b.os_lists[tipo]) ? b.os_lists[tipo] : [];
      if(!lista.length) return;
      const cor = item.querySelector('.dot')?.style.background || 'var(--op)';
      const ml  = MANUT_LABELS[tipo] || OPER_LABEL;
      const content = buildRichTip(lista, tipo+' · '+(ml.nome||tipo), cor);
      if(!content) return;
      osRichTip.innerHTML = content;
      osRichTip.classList.add('show');
      placeRichTip(e);
    });
    item.addEventListener('mousemove', placeRichTip);
    item.addEventListener('mouseleave', ()=>osRichTip.classList.remove('show'));
  });
}


// ===================== MAIN RENDER =====================
function render(){
  const b=DATA.dados[state.mes]&&DATA.dados[state.mes][state.operador];
  if(!b){$("main").innerHTML='<div class="empty">Sem dados para esta seleção</div>';return}
  const lbl=formatMesLabel(state.mes);
  const opTitle=state.operador==="_ALL"?"Todos os operadores":state.operador.replace(/\./g," ");
  $("main").innerHTML=
    '<div class="section-head"><div><h2>'+lbl.top+' <span style="color:var(--text-dim);font-weight:500">· '+lbl.sub+'</span></h2><div class="sub">'+opTitle+' · '+b.total_os+' OS · '+fmtNum(b.horas_total)+'h registradas</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="pill"><span class="dot" style="background:var(--op)"></span>'+fmtNum(b.horas_oper)+'h operação</span><span class="pill"><span class="dot" style="background:var(--maint)"></span>'+fmtNum(b.horas_manut)+'h manutenção</span></div></div>'
    +renderKPIs(b)
    +renderGaugeCard(b)
    +renderHHPanel(b)
    +'<div class="grid-2"><div class="card"><h3>Horas por dia <span style=\"display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--surface-3);color:var(--text-mute);font-size:10px;font-weight:700;margin-left:8px;cursor:help;vertical-align:middle\" title=\"Barras azuis = horas operacionais (OPER). Barras roxas = horas de manutenção (soma de todos os tipos). Passe o mouse para ver o detalhamento do dia. Use os campos De/Até para filtrar um período — o gráfico reagrupa automaticamente se houver mais de 31 dias.\">?</span></h3>'
    +'<div class="date-filter"><label>De: <input type="date" id="startDate"></label><label>Até: <input type="date" id="endDate"></label><button id="applyDateFilter">Aplicar</button><button id="clearDateFilter" style="margin-left:6px">Limpar</button></div>'
    +'<div class="card-sub">Operação vs. Manutenção · passe o mouse sobre as barras para detalhamento</div>'
    +renderChartFiltered(b,state.mes)
    +'</div>'
    +'<div class="card"><h3>Ordens de Serviço por tipo <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--surface-3);color:var(--text-mute);font-size:10px;font-weight:700;margin-left:8px;cursor:help;vertical-align:middle" title="Quantidade de OS (Ordens de Serviço) distintas por classificação no período selecionado. OPER = operação, CORR = corretiva, EM = emergencial, PRED = preditiva, PREV = preventiva, SERV = serviços gerais, MODI = modificativa. Clique em Copiar para copiar os números das OS.">?</span></h3><div class="card-sub">Quantidade de OS distintas no período</div>'+renderOS(b)+'</div></div>'
    +'<div class="card" style="margin-top:16px"><h3>Detalhamento · Manutenção <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--surface-3);color:var(--text-mute);font-size:10px;font-weight:700;margin-left:8px;cursor:help;vertical-align:middle" title="Horas totais registradas em cada categoria de manutenção no período. Corretiva (CORR) = falha não planejada. Emergencial (EM) = intervenção urgente. Preditiva (PRED) = baseada em condição. Preventiva (PREV) = programada por tempo/ciclo. Serviços (SERV) = apoio operacional. Modificativa (MODI) = melhorias e adaptações.">?</span></h3><div class="card-sub">Horas totais em cada tipo de manutenção</div>'+renderBreakdown(b)+'</div>';
  bindTooltips();
  bindDateFilter();
  drawGauge(b);
  bindCopyButtons();
  bindOSTooltips();
  bindOSItemTooltips();
  $("footStats").textContent=DATA.meses.length+" meses · "+(DATA.operadores||[]).length+" operadores";
  // Atualiza informações de rodapé
  const ls=document.getElementById('lastSync');
  if(ls){ls.textContent='Sincronizado em '+ new Date().toLocaleString('pt-BR');}
  const dl=document.getElementById('dataLink');
  if(dl){dl.href='https://drive.google.com/drive/folders/1ckqvL24ShJQxY8ZK1Aiw3BDkiKPrrXNE';}
}

// ===================== TOOLTIP =====================
const tip=$("tooltip");
function bindTooltips(){document.querySelectorAll(".bar-chart .bar").forEach(bar=>{bar.addEventListener("mouseenter",onEnter);bar.addEventListener("mousemove",onMove);bar.addEventListener("mouseleave",onLeave);bar.addEventListener("touchstart",onEnter,{passive:true})})}
function onEnter(e){const el=e.currentTarget;const day=JSON.parse(el.dataset.day.replace(/&quot;/g,'"'));tip.innerHTML=buildTT(day);tip.classList.add("show");placeT(e)}
function onMove(e){placeT(e)}
function onLeave(){tip.classList.remove("show")}
function placeT(e){const tw=tip.offsetWidth,th=tip.offsetHeight;let cx=e.clientX||0,cy=e.clientY||0;let x=cx+14,y=cy-th-12;if(x+tw>window.innerWidth-14)x=cx-tw-14;if(y<14)y=cy+16;tip.style.left=x+"px";tip.style.top=y+"px"}
function buildTT(day){
  // Formatar data DD/MM/AAAA para o tooltip
  let diaTxt;
  if(String(day.dia).includes('-')){
    const pts=String(day.dia).split('-');
    diaTxt=(pts[1]||pts[0]).padStart(2,'0')+'/'+(pts[0]).padStart(2,'0');
  } else {
    const [ano,mes]=state.mes.split('-');
    diaTxt=(String(day.dia).padStart(2,'0'))+'/'+(mes||'??')+'/'+(ano||'??');
  }
  const opH=day.OPER||0;
  const md=TIPOS_MANUT.map(t=>{const v=day[t]||0;if(v<=0)return"";const m=MANUT_LABELS[t];return'<div class="tt-row"><div class="lhs"><span class="swatch" style="background:'+m.cor+'"></span><span class="name">'+t+' · '+m.nome+'</span></div><span class="val">'+fmtH(v)+'</span></div>'}).join("");
  const total=(day.oper_total||0)+(day.manut_total||0);
  let h='<div class="tt-head"><span>Detalhes</span><span class="dia">'+diaTxt+'</span></div>';
  if(opH>0) h+='<div class="tt-section"><div class="tt-section-title"><span class="dot" style="background:var(--op)"></span>Operação</div><div class="tt-row"><div class="lhs"><span class="swatch" style="background:var(--op)"></span><span class="name">OPER · Operacional</span></div><span class="val">'+fmtH(opH)+'</span></div></div>';
  if(md) h+='<div class="tt-section"><div class="tt-section-title"><span class="dot" style="background:var(--maint)"></span>Manutenção</div>'+md+'</div>';
  h+='<div class="tt-total"><span>Total no dia</span><span class="val" style="font-family:\'JetBrains Mono\',monospace">'+fmtH(total)+'</span></div>';
  // Se todos os operadores estiverem sendo visualizados, exibir média por operador
  if(state.operador === "_ALL" && (DATA.operadores && DATA.operadores.length)){
    const avg = total / DATA.operadores.length;
    h+='<div class="tt-total"><span>Média por operador</span><span class="val" style="font-family:\'JetBrains Mono\',monospace">'+fmtH(avg)+'</span></div>';
  }
  return h;
}

// ===================== INIT =====================
buildFilter();buildTabs();render();

  /*
   * Se um URL de script Google foi definido, substituímos a função
   * refreshData pelo carregamento dos dados a partir do Apps Script.
   * Dessa forma o botão de atualização passa a obter as horas e OS
   * diretamente das planilhas hospedadas no Drive.
   */
  if (GOOGLE_SCRIPT_URL) {
    refreshData = async function() {
      const btn = $("btnRefresh");
      if (btn) {
        btn.classList.add("loading");
        btn.querySelector(".txt").textContent = "Buscando…";
      }
      try {
        const sep = GOOGLE_SCRIPT_URL.indexOf('?') === -1 ? '?' : '&';
        const url = GOOGLE_SCRIPT_URL + sep + '_=' + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error('Erro ao acessar o script (' + res.status + ')');
        const newData = await res.json();
        // Substitui totalmente a estrutura de dados
        DATA = newData;
        // Ajusta estado para o último mês disponível
        if (Array.isArray(DATA.meses) && DATA.meses.length) {
          state.mes = DATA.meses[DATA.meses.length - 1];
        }
        // Reconstrói filtros e abas
        buildFilter();
        buildTabs([]);
        render();
        showToast('✓ Dados carregados via Google Apps Script', 'success');
        if (btn) {
          btn.classList.add('done');
          btn.querySelector('.txt').textContent = 'Atualizado ✓';
        }
      } catch (e) {
        console.error(e);
        showToast('Falha ao carregar dados da planilha: ' + e.message, 'error');
        if (btn) {
          btn.querySelector('.txt').textContent = 'Atualizar';
        }
      } finally {
        if (btn) {
          btn.classList.remove('loading');
          setTimeout(() => {
            btn.classList.remove('done');
            btn.querySelector('.txt').textContent = 'Atualizar';
          }, 5000);
        }
      }
    };
    // Carrega imediatamente ao abrir a página
    refreshData().catch(err => console.error(err));
  }
window.addEventListener("scroll",()=>tip.classList.remove("show"),{passive:true});
window.addEventListener("resize",()=>tip.classList.remove("show"));

})();
</script>
