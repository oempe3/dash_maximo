<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Painel Operacional · Turma B · Manutenção & Operação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --surface-0:#0b0f14;--surface-1:#11161d;--surface-2:#161d26;--surface-3:#1c2530;--surface-4:#222d3a;
  --line:rgba(255,255,255,.06);--line-strong:rgba(255,255,255,.12);
  --text:#e7ecf3;--text-mute:#9aa6b6;--text-dim:#6a7689;
  /*
   * Paleta atualizada para harmonizar com as cores dos logotipos (gradiente de azul a roxo).
   * A cor principal de operação usa um azul claro (#60a5fa) e uma variante mais escura (#3b82f6) para os gradientes.
   * A cor principal de manutenção usa um roxo (#a855f7); ajustes nas versões soft garantem contraste adequado no fundo escuro.
   */
  --op:#60a5fa;--op-2:#3b82f6;--op-soft:rgba(96,165,250,.12);
  --m-corr:#ef4444;--m-em:#dc2626;--m-pred:#f97316;--m-prev:#f59e0b;--m-serv:#eab308;--m-modi:#a16207;
  --maint:#a855f7;--maint-soft:rgba(168,85,247,.12);
  --radius-lg:22px;--radius-md:16px;--radius-sm:10px;
  --shadow-1:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.35);
  --shadow-2:0 1px 0 rgba(255,255,255,.04) inset,0 16px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Inter Tight',system-ui,sans-serif;background:radial-gradient(1100px 600px at 90% -10%,rgba(34,211,238,.08),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(245,158,11,.07),transparent 60%),var(--surface-0);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:.005em}

/* ===== App Bar ===== */
.appbar{position:sticky;top:0;z-index:30;background:rgba(11,15,20,.78);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line)}
.appbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:14px 22px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-mark{width:38px;height:38px;border-radius:12px;background:conic-gradient(from 200deg at 50% 50%,var(--op) 0deg,var(--maint) 140deg,var(--op) 360deg);position:relative;box-shadow:0 4px 14px rgba(34,211,238,.25),0 4px 14px rgba(245,158,11,.18);flex-shrink:0}
.brand-mark::after{content:"";position:absolute;inset:5px;border-radius:8px;background:var(--surface-1)}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand-text .t{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em}
.brand-text .s{font-size:11px;color:var(--text-mute);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.appbar-spacer{flex:1}
.appbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Refresh btn */
.btn-refresh{
  appearance:none;border:1px solid var(--line-strong);background:var(--surface-2);color:var(--text);
  font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:600;
  padding:9px 16px;border-radius:999px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:all .25s ease;white-space:nowrap;
}
.btn-refresh:hover{background:var(--surface-3);border-color:var(--op);color:var(--op)}
.btn-refresh.loading{pointer-events:none;opacity:.7}
.btn-refresh.loading .ico{animation:spin .8s linear infinite}
.btn-refresh.done{border-color:rgba(34,197,94,.4);color:#22c55e}
.btn-refresh .ico{width:16px;height:16px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-refresh .status{font-size:10px;color:var(--text-dim);margin-left:2px}

.op-filter{display:flex;gap:6px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px}
.op-filter select{appearance:none;background:transparent;color:var(--text);border:0;outline:0;font-family:inherit;font-size:13px;font-weight:500;padding:8px 28px 8px 14px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%239aa6b6' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 10px center}
.op-filter select option{background:var(--surface-2);color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;background:var(--surface-3);border:1px solid var(--line-strong);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:500;box-shadow:var(--shadow-2);opacity:0;transition:all .4s cubic-bezier(.2,.8,.2,1);pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
.toast.success{border-color:rgba(34,197,94,.4);color:#86efac}

/* ===== Tabs ===== */
.tabs-wrap{max-width:1400px;margin:0 auto;padding:18px 22px 0}
.tabs{display:flex;gap:8px;flex-wrap:wrap;background:var(--surface-1);border:1px solid var(--line);padding:6px;border-radius:16px;width:fit-content;max-width:100%}
.tab{appearance:none;border:0;background:transparent;color:var(--text-mute);font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;letter-spacing:.02em;padding:10px 18px;border-radius:11px;cursor:pointer;transition:all .25s ease;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1}
.tab .tab-sub{font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{background:linear-gradient(180deg,rgba(34,211,238,.18),rgba(34,211,238,.06));color:var(--text);box-shadow:0 0 0 1px rgba(34,211,238,.35) inset,0 6px 18px rgba(34,211,238,.10)}
.tab.active .tab-sub{color:var(--op)}
.tab.tab-anual{background:linear-gradient(180deg,rgba(245,158,11,.16),rgba(34,211,238,.10))}
.tab.tab-anual.active{background:linear-gradient(180deg,rgba(245,158,11,.28),rgba(34,211,238,.18));box-shadow:0 0 0 1px rgba(245,158,11,.35) inset,0 6px 18px rgba(245,158,11,.12)}
.tab.tab-new{animation:tabPulse 2s ease-in-out 3}
@keyframes tabPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(34,197,94,.5),0 0 20px rgba(34,197,94,.15)}}

/* ===== Main ===== */
.main{max-width:1400px;margin:0 auto;padding:18px 22px 60px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:14px 4px 14px;flex-wrap:wrap}
.section-head h2{font-family:'Outfit',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.015em;margin:0}
.section-head .sub{font-size:13px;color:var(--text-mute)}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);padding:6px 12px;border-radius:999px;font-size:12px;color:var(--text-mute);font-weight:500}
.pill .dot{width:7px;height:7px;border-radius:99px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:8px}
.kpi{position:relative;overflow:hidden;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px 18px 16px;box-shadow:var(--shadow-1);transition:transform .35s cubic-bezier(.2,.8,.2,1),border-color .25s;animation:kpiIn .55s cubic-bezier(.2,.8,.2,1) both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.07s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.17s}.kpi:nth-child(5){animation-delay:.22s}.kpi:nth-child(6){animation-delay:.27s}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-strong)}
@keyframes kpiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi .label{font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.kpi .value{font-family:'Outfit',sans-serif;font-weight:700;font-size:34px;letter-spacing:-.025em;margin-top:6px;line-height:1;display:flex;align-items:baseline;gap:6px}
.kpi .value .unit{font-size:13px;color:var(--text-mute);font-weight:500;letter-spacing:0}
.kpi .meta{font-size:12px;color:var(--text-dim);margin-top:6px}
.kpi .badge{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface-3);font-size:14px}
.kpi.kpi-op .badge{background:var(--op-soft);color:var(--op)}.kpi.kpi-manut .badge{background:var(--maint-soft);color:var(--maint)}
.kpi.kpi-op .value{color:var(--op)}.kpi.kpi-manut .value{color:var(--maint)}
.kpi.kpi-op::after,.kpi.kpi-manut::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px}
.kpi.kpi-op::after{background:linear-gradient(90deg,var(--op),transparent)}.kpi.kpi-manut::after{background:linear-gradient(90deg,var(--maint),transparent)}

/* Cards */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:18px}
@media(max-width:980px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-1)}
.card h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.01em;margin:0 0 4px}
.card .card-sub{font-size:12px;color:var(--text-mute);margin-bottom:16px}

/* Chart */
.chart-legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-mute)}
.legend-item .swatch{width:12px;height:12px;border-radius:3px;display:inline-block}
.legend-item .swatch.op{background:var(--op)}.legend-item .swatch.manut{background:var(--maint)}
.chart-scroll{overflow-x:auto;overflow-y:visible;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.chart-scroll::-webkit-scrollbar{height:8px}.chart-scroll::-webkit-scrollbar-track{background:transparent}.chart-scroll::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:300px;padding:14px 4px 30px;position:relative;min-width:100%}
.bar-grid{position:absolute;left:36px;right:0;top:14px;bottom:30px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.bar-grid .gline{height:1px;background:var(--line);position:relative}
.bar-grid .gline::before{content:attr(data-v);position:absolute;left:-32px;top:-7px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.bar-col{flex:1 1 0;min-width:22px;max-width:60px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;height:100%;padding-left:2px;padding-right:2px}
.bar-stack{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.bar-pair{display:flex;gap:3px;width:100%;flex:1;align-items:flex-end}
.bar{flex:1;border-radius:6px 6px 2px 2px;position:relative;cursor:pointer;transition:filter .15s ease,transform .15s ease;min-height:0;animation:barRise .6s cubic-bezier(.2,.8,.2,1) both}
.bar:hover{filter:brightness(1.18);transform:translateY(-1px)}
.bar.bar-op{background:linear-gradient(180deg,var(--op),var(--op-2));box-shadow:0 0 12px rgba(34,211,238,.25)}
.bar.bar-manut{background:linear-gradient(180deg,var(--m-prev),var(--m-modi));box-shadow:0 0 12px rgba(245,158,11,.25)}
@keyframes barRise{from{opacity:0;transform:scaleY(.2);transform-origin:bottom}to{opacity:1;transform:scaleY(1)}}
.bar-label{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* Tooltip */
.os-rich-tip{
  position:fixed;z-index:85;
  background:rgba(17,22,29,.97);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  padding:14px 16px;
  min-width:280px;max-width:480px;
  box-shadow:0 16px 40px rgba(0,0,0,.5);
  font-size:12px;pointer-events:none;
  opacity:0;transform:translateY(6px);
  transition:opacity .15s ease,transform .15s ease;
  color:#e7ecf3;
}
.os-rich-tip.show{opacity:1;transform:translateY(0)}
.os-rich-tip-head{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:8px}
.os-rich-tip-row{display:grid;grid-template-columns:80px 1fr auto;gap:6px;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.os-rich-tip-row:last-child{border-bottom:none}
.os-num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;color:#60a5fa}
.os-desc{font-size:11px;color:#9aa6b6;line-height:1.3}
.os-loc{font-size:10px;color:#6a7689}
.os-st{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap}
.st-concluida{background:rgba(34,197,94,.15);color:#22c55e}
.st-andamento{background:rgba(96,165,250,.15);color:#60a5fa}
.st-aprovada{background:rgba(168,85,247,.15);color:#a855f7}
.st-aguardando{background:rgba(239,68,68,.15);color:#ef4444}
.st-programada{background:rgba(245,158,11,.15);color:#f59e0b}
.os-rich-tip-foot{margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);
  font-size:10px;color:#6a7689;display:flex;justify-content:space-between}
.tooltip{position:fixed;z-index:80;background:rgba(17,22,29,.96);backdrop-filter:blur(10px);border:1px solid var(--line-strong);border-radius:14px;padding:12px 14px;min-width:240px;box-shadow:var(--shadow-2);color:var(--text);font-size:12px;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s ease,transform .12s ease}
.tooltip.show{opacity:1;transform:translateY(0)}
.tt-head{display:flex;justify-content:space-between;align-items:baseline;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.tt-head .dia{color:var(--text-mute);font-size:11px;font-weight:500}
.tt-section{margin-top:8px}.tt-section:first-of-type{margin-top:0}
.tt-section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tt-section-title .dot{width:7px;height:7px;border-radius:2px}
.tt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.tt-row .lhs{display:flex;align-items:center;gap:8px}
.tt-row .swatch{width:10px;height:10px;border-radius:3px;display:inline-block}
.tt-row .name{color:var(--text-mute)}.tt-row .val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
.tt-total{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;font-weight:700;font-size:13px}

  /* Copy button styling for OS lists and breakdown */
  .copy-btn{
    appearance:none;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
    padding:4px 6px;border-radius:6px;background:var(--surface-2);color:var(--text-mute);font-size:12px;
    transition:all .2s ease;
  }
  .copy-btn:hover{
    background:var(--surface-3);color:var(--op);
  }

/* OS list */
.os-list{display:flex;flex-direction:column;gap:8px}
.os-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);transition:all .2s ease}
.os-item:hover{border-color:var(--line-strong);transform:translateX(2px)}
.os-item .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.os-item .label{flex:1;font-weight:600;font-size:13px;display:flex;flex-direction:column;gap:1px}
.os-item .label .full{font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase}
.os-item .count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px}
.os-summary{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;margin-bottom:12px}
.os-summary .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-mute);font-weight:600}
.os-summary .val{font-family:'Outfit',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.02em}

/* Breakdown */
.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.bd-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px}
.bd-row .swatch{width:8px;height:24px;border-radius:3px;flex-shrink:0}
.bd-row .info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.bd-row .name{font-size:12px;font-weight:600;color:var(--text)}
.bd-row .full{font-size:10px;color:var(--text-dim)}
.bd-row .v{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px}

.empty{text-align:center;padding:50px 20px;color:var(--text-dim);font-size:13px}

/* Footer */
.footer{max-width:1400px;margin:0 auto;padding:24px 22px 40px;border-top:1px solid var(--line);margin-top:30px;font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer code{font-family:'JetBrains Mono',monospace;background:var(--surface-2);padding:2px 6px;border-radius:5px;color:var(--text-mute)}

@media(max-width:680px){
  .appbar-inner{padding:12px 16px;gap:10px}
  .brand-text .t{font-size:15px}.brand-text .s{font-size:10px}
  .tabs-wrap,.main,.footer{padding-left:14px;padding-right:14px}
  .tab{padding:8px 12px;font-size:12px}
  .kpi{padding:14px}.kpi .value{font-size:26px}
  .card{padding:16px}.breakdown{grid-template-columns:1fr}
  .section-head h2{font-size:22px}
}

  /* ===== Custom enhancements ===== */
  /* Date filter controls */
  .date-filter{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;font-size:12px;align-items:center}
  .date-filter label{display:flex;align-items:center;gap:4px;color:var(--text-mute)}
  .date-filter input[type="date"]{background:var(--surface-2);color:var(--text);border:1px solid var(--line);padding:5px 6px;border-radius:8px;font-size:12px}
  .date-filter button{appearance:none;border:1px solid var(--line-strong);background:var(--surface-2);color:var(--text);font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;cursor:pointer;transition:all .25s ease;white-space:nowrap}
  .date-filter button:hover{background:var(--surface-3);border-color:var(--op);color:var(--op)}
  /* Header logos */
  .header-logos{display:flex;gap:10px;align-items:center;margin-left:12px}
  .logo-img{width:32px;height:auto;filter:drop-shadow(0 0 4px rgba(0,0,0,.3))}
  /* O terceiro logotipo (relatório) deve ter destaque maior */
  .header-logos a:last-child .logo-img{width:40px}
  /* Gauge card */
  .gauge-wrap{display:flex;justify-content:center;align-items:center;padding-top:10px;padding-bottom:10px}
  /* Semicircular gauge implementation sem dependência externa de Chart.js */
  .gauge-svg-wrap{display:flex;flex-direction:column;align-items:center;gap:0;padding:8px 0 0}
  .gauge-legend{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--text-mute)}
  .gauge-legend-item{display:flex;align-items:center;gap:6px}
  .gauge-legend-dot{width:10px;height:10px;border-radius:2px}
  .gauge-center-label{text-align:center;margin-top:6px}
  .gauge-center-label .gh{font-family:'Outfit',sans-serif;font-size:26px;font-weight:700;line-height:1}
  .gauge-center-label .gs{font-size:11px;color:var(--text-dim);margin-top:2px}
</style>
<!-- O gráfico do velocímetro é implementado com HTML/CSS, portanto a dependência Chart.js foi removida -->
</head>
<body>

 de equipamento", "local": "UTE-B04", "status": "CONCLUÍDA"}}}</script>

<script>
(function(){
"use strict";

// ===================== CONSTANTS =====================
const TIPOS_OPER=["OPER"],TIPOS_MANUT=["CORR","EM","PRED","PREV","SERV","MODI"],ALL_TIPOS=[...TIPOS_OPER,...TIPOS_MANUT];

  /**
   * URL do aplicativo web Google Apps Script responsável por gerar
   * o JSON de dados a partir das planilhas no Google Drive.  Altere
   * este valor para o URL de publicação do seu script (formato
   * https://script.google.com/macros/s/AKfycb.../exec).  Caso
   * esteja vazio, a dashboard utilizará apenas os dados embutidos
   * no HTML.
   */
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxeVq9_7PwIpg0Asa-lW-e-wauzVoBSezH2A_ookYryt5G0kBCF0wWDfm1CYlOW_I3jdw/exec";
const MANUT_LABELS={CORR:{nome:"Corretiva",cor:"var(--m-corr)"},EM:{nome:"Emergencial",cor:"var(--m-em)"},PRED:{nome:"Preditiva",cor:"var(--m-pred)"},PREV:{nome:"Preventiva",cor:"var(--m-prev)"},SERV:{nome:"Serviços",cor:"var(--m-serv)"},MODI:{nome:"Modificativa",cor:"var(--m-modi)"}};
const OPER_LABEL={nome:"Operacional",cor:"var(--op)"};
const MES_NOMES={"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};

// ===================== STATE =====================
// Inicializa com dados embutidos (fallback)
let DATA=JSON.parse(document.getElementById("data-blob").textContent);
// Estado global inclui período de data para filtragem (startDate/endDate)
const state={
  mes: DATA.meses[DATA.meses.length-1],
  operador: "_ALL",
  startDate: null,
  endDate: null
};

  // Personalização do título/subtítulo da dashboard. Caso o dataset inclua
  // campos `titulo` ou `subtitulo`, eles serão utilizados; caso contrário,
  // serão aplicados valores padrão alinhados à Turma B.
  const DASHBOARD_TITLE = (DATA.titulo || 'Painel Operacional – Turma B');
  const DASHBOARD_SUBTITLE = (DATA.subtitulo || 'Operação · Manutenção · Ordens de Serviço');
  // Atualiza o texto da marca no cabeçalho
  const brandTitleEl = document.querySelector('.brand-text .t');
  const brandSubEl = document.querySelector('.brand-text .s');
  if (brandTitleEl) brandTitleEl.textContent = DASHBOARD_TITLE;
  if (brandSubEl) brandSubEl.textContent = DASHBOARD_SUBTITLE;

// ===================== HELPERS =====================
function fmtH(v){if(!v)return"0h";const h=Math.floor(v),m=Math.round((v-h)*60);return m===0?h+"h":h+"h "+String(m).padStart(2,"0")+"m"}
function fmtNum(v,d){return Number(v||0).toFixed(d||0).replace(".",",")}
function formatMesLabel(ym){if(ym==="ANUAL")return{top:"Anual",sub:"Consolidado"};const[a,m]=ym.split("-");return{top:MES_NOMES[m]||m,sub:a}}
function $(id){return document.getElementById(id)}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg,type){
  const t=$("toast");t.textContent=msg;t.className="toast "+type+" show";
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),4000);
}

// ===================== REFRESH =====================
async function refreshData(){
  const btn=$("btnRefresh");
  btn.classList.add("loading");
  btn.querySelector(".txt").textContent="Buscando…";
  try{
    // Detectar base URL do repositório (funciona no GitHub Pages)
    const base=window.location.href.replace(/\/[^/]*$/,"/");
    const manifestURL=base+"data/index.json?_="+Date.now();
    const res=await fetch(manifestURL);
    if(!res.ok) throw new Error("Manifesto não encontrado ("+res.status+")");
    const manifest=await res.json();

    // Quais meses novos existem?
    const currentMeses=new Set(DATA.meses);
    const allRemote=manifest.meses||[];
    const newMeses=allRemote.filter(m=>!currentMeses.has(m));

    // Baixar os JSONs de todos os meses remotos (para garantir dados atualizados)
    let updated=false;
    for(const ym of allRemote){
      try{
        const mRes=await fetch(base+"data/"+ym+".json?_="+Date.now());
        if(!mRes.ok) continue;
        const mData=await mRes.json();
        DATA.dados[ym]=mData.dados;
        updated=true;
      }catch(e){console.warn("Erro ao baixar "+ym+".json",e)}
    }

    // Atualizar ANUAL com o manifesto
    if(manifest.anual){
      DATA.dados["ANUAL"]=manifest.anual;
    }

    // Atualizar lista de meses e operadores
    DATA.meses=allRemote;
    if(manifest.operadores&&manifest.operadores.length) DATA.operadores=manifest.operadores;

    // Rebuild UI
    buildFilter();
    buildTabs(newMeses);
    if(!DATA.dados[state.mes]){state.mes=DATA.meses[DATA.meses.length-1]}
    render();

    if(newMeses.length>0){
      showToast("✓ "+newMeses.length+" novo(s) mês(es) encontrado(s): "+newMeses.join(", "),"success");
      btn.classList.add("done");
      btn.querySelector(".txt").textContent="Atualizado ✓";
    }else if(updated){
      showToast("✓ Dados atualizados com sucesso","success");
      btn.classList.add("done");
      btn.querySelector(".txt").textContent="Atualizado ✓";
    }else{
      showToast("Nenhum mês novo encontrado","");
      btn.querySelector(".txt").textContent="Atualizar";
    }
  }catch(e){
    console.error("Refresh error:",e);
    showToast("Sem dados remotos — usando dados embutidos","error");
    btn.querySelector(".txt").textContent="Atualizar";
  }finally{
    btn.classList.remove("loading");
    setTimeout(()=>{btn.classList.remove("done");btn.querySelector(".txt").textContent="Atualizar"},5000);
  }
}

$("btnRefresh").addEventListener("click",refreshData);

// ===================== TABS =====================
function buildTabs(highlightNew){
  const root=$("tabs");root.innerHTML="";
  const items=[...DATA.meses,"ANUAL"];
  const newSet=new Set(highlightNew||[]);
  items.forEach(ym=>{
    const lbl=formatMesLabel(ym);
    const b=document.createElement("button");
    let cls="tab";
    if(ym==="ANUAL") cls+=" tab-anual";
    if(ym===state.mes) cls+=" active";
    if(newSet.has(ym)) cls+=" tab-new";
    b.className=cls;b.dataset.ym=ym;
    b.innerHTML='<span>'+lbl.top+'</span><span class="tab-sub">'+lbl.sub+'</span>';
    b.addEventListener("click",()=>{state.mes=ym;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.ym===ym));render()});
    root.appendChild(b);
  });
}

// ===================== OPERATOR FILTER =====================
function buildFilter(){
  const sel=$("operFilter");
  const current=sel.value||"_ALL";
  sel.innerHTML='<option value="_ALL">Todos os operadores</option>';
  (DATA.operadores||[]).forEach(op=>{
    const o=document.createElement("option");o.value=op;o.textContent=op.replace(/\./g," ");
    sel.appendChild(o);
  });
  sel.value=current;
  // Rebind (safe to call multiple times since we replace innerHTML)
  sel.onchange=function(e){state.operador=e.target.value;render()};
}

// ===================== RENDER KPIs =====================
function renderKPIs(b){
  const dias=b.dias_trabalhados,ht=dias*8,hu=dias*7;
  // HH Programado: 7h por operador por dia com lançamento (= dias_trabalhados × 7)
  // Quando _ALL: soma todos os operadores, então hh_prog = dias × 7 (por operador individual)
  // Para _ALL: hh_prog = dias_trabalhados × 7 (planejado total = 7h/op × 1 op equivalente por dia)
  // Conforme regra: cada dia com hora lançada = 7h manutenção planejada
  const nOps = (typeof state !== 'undefined' && state.operador === '_ALL') ? 3 : 1;
  const hhProg = dias * 7 * nOps;
  // HH Apontado = soma de TODOS os tipos (OPER + MODI + PREV + CORR + EM + PRED + SERV)
  const hhApt = b.horas_total || 0;
  const pctHH = hhProg > 0 ? Math.min(Math.round((hhApt/hhProg)*100), 999) : 0;
  const corPct = pctHH >= 100 ? '#22c55e' : (pctHH >= 80 ? 'var(--maint)' : '#ef4444');
  return '<div class="kpis">'
    +'<div class="kpi kpi-op"><div class="badge">⚙</div><div class="label">Horas operacionais</div><div class="value">'+fmtNum(b.horas_oper)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_oper)+' totais em OPER</div></div>'
    +'<div class="kpi kpi-manut"><div class="badge">🛠</div><div class="label">Horas em manutenção</div><div class="value">'+fmtNum(b.horas_manut)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_manut)+' · 6 tipos combinados</div></div>'
    +'<div class="kpi"><div class="badge">📅</div><div class="label">Dias trabalhados</div><div class="value">'+dias+'<span class="unit">dias</span></div><div class="meta">com lançamento de horas</div></div>'
    +'<div class="kpi"><div class="badge">⏱</div><div class="label">Horas totais (×8h)</div><div class="value">'+ht+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 8h · 4 operadores</div></div>'
    +'<div class="kpi"><div class="badge">🕖</div><div class="label">Horas úteis (×7h)</div><div class="value">'+hu+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 7h previstas</div></div>'
    +'<div class="kpi"><div class="badge">📋</div><div class="label">Ordens de serviço</div><div class="value">'+b.total_os+'<span class="unit">OS</span></div><div class="meta">distintas no período</div></div>'
    +'</div>';
}

// ===================== HH APONTADO × HH PROGRAMADO =====================
// HH Programado = dias_trabalhados × 7h (manutenção planejada: 7h/dia com lançamento)
// HH Apontado   = horas_manut APENAS (todos os tipos de manutenção exceto OPER)
// Regra: cada dia com qualquer lançamento = 7h de manutenção planejada
function renderHHPanel(b){
  const dias = b.dias_trabalhados || 0;
  // Programado: 7h por dia com lançamento
  const hhProg = dias * 7;
  // Apontado: APENAS manutenção (exclui OPER)
  const hhApt  = b.horas_manut || 0;
  const hhOper = b.horas_oper  || 0;
  const pct    = hhProg > 0 ? Math.round((hhApt / hhProg) * 100) : 0;
  const cor    = pct >= 100 ? '#22c55e' : (pct >= 80 ? '#f59e0b' : '#ef4444');
  const label  = pct >= 100 ? 'Meta atingida ✓' : (pct >= 80 ? 'Abaixo do previsto' : 'Crítico — abaixo de 80%');
  const barW   = Math.min(pct, 100);
  // Detalhamento por subtipo de manutenção
  const tipos  = b.tipos || {};
  const tiposInfo = [
    {k:'CORR',nome:'Corretiva',   cor:'var(--m-corr)'},
    {k:'EM',  nome:'Emergencial', cor:'var(--m-em)'},
    {k:'PRED',nome:'Preditiva',   cor:'var(--m-pred)'},
    {k:'PREV',nome:'Preventiva',  cor:'var(--m-prev)'},
    {k:'SERV',nome:'Serviços',    cor:'var(--m-serv)'},
    {k:'MODI',nome:'Modificativa',cor:'var(--m-modi)'},
  ];
  const subtipos = tiposInfo
    .filter(t => (tipos[t.k]||0) > 0)
    .map(t => {
      const v = tipos[t.k]||0;
      const p = hhApt > 0 ? Math.round((v/hhApt)*100) : 0;
      return '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px">'
        +'<span style="width:6px;height:22px;border-radius:2px;background:'+t.cor+';flex-shrink:0"></span>'
        +'<span style="flex:1;font-size:12px;color:var(--text-mute)">'+t.k+' · '+t.nome+'</span>'
        +'<span style="font-family:JetBrains Mono,monospace;font-size:12px;font-weight:600">'+v.toFixed(0)+'h</span>'
        +'<span style="font-size:11px;color:var(--text-dim);min-width:34px;text-align:right">'+p+'%</span>'
      +'</div>';
    }).join('');

  // Tooltip explicativo do painel
  const ttExplain = 'title="HH Programado = dias com lançamento × 7h planejadas de manutenção. HH Apontado = soma das horas de manutenção registradas (excluindo OPER). Aderência = Apontado ÷ Programado × 100%."';

  return '<div class="card" style="margin-top:16px">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">'
      +'<div>'
        +'<h3 style="margin:0 0 2px">Homem-Hora Apontado × Programado'
          +'<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--surface-3);color:var(--text-mute);font-size:10px;font-weight:700;margin-left:8px;cursor:help;vertical-align:middle" '+ttExplain+'>?</span>'
        +'</h3>'
        +'<div class="card-sub" style="margin-bottom:0">Manutenção apontada vs. meta planejada por dias trabalhados</div>'
      +'</div>'
    +'</div>'
    // 3 cards de destaque
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0">'
      // Card HH Programado
      +'<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-align:center;position:relative" title="HH Programado = '+dias+' dias com lançamento × 7h de manutenção planejada por dia">'
        +'<div style="font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">HH Programado</div>'

        +'<div style="font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">HH Apontado (MNT)</div>'
        +'<div style="font-family:Outfit,sans-serif;font-size:28px;font-weight:700;color:var(--maint)">'+hhApt.toFixed(0)+'<span style="font-size:13px;color:var(--text-mute);font-weight:400">h</span></div>'

      +'<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-align:center" title="Aderência = HH Apontado (MNT) ÷ HH Programado × 100%. Acima de 100% indica que mais horas de manutenção foram apontadas do que o mínimo planejado.">'
        +'<div style="font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Aderência HH</div>'
        +'<div style="font-family:Outfit,sans-serif;font-size:28px;font-weight:700;color:'+cor+'">'+pct+'<span style="font-size:13px;font-weight:400">%</span></div>'
        +'<div style="font-size:11px;margin-top:4px;color:'+cor+'">'+label+'</div>'
      +'</div>'
    +'</div>'
    // Barra de progresso com marcação dos 100%
    +'<div style="position:relative;margin-bottom:6px">'
      +'<div style="background:var(--surface-3);border-radius:999px;height:12px;overflow:hidden">'
        +'<div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,'+cor+','+cor+'bb);border-radius:999px;transition:width .6s ease"></div>'
      +'</div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:16px">'
      +'<span>0h</span>'
      +'<span>Meta: '+hhProg+'h (100%)</span>'
      +'<span style="color:'+cor+'">Apontado: '+hhApt.toFixed(0)+'h ('+pct+'%)</span>'
    +'</div>'
    // Separador e subtítulo de subtipo
    +'<div style="font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Detalhamento por tipo de manutenção apontada</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:6px">'
      +subtipos
    +'</div>'
    // Nota de rodapé do card
    +'<div style="margin-top:12px;padding:8px 12px;background:var(--surface-2);border-radius:8px;font-size:11px;color:var(--text-dim)">'
      +'ℹ️ OPER não entra no HH Apontado · Horas operacionais apontadas: <strong style="color:var(--op)">'+hhOper.toFixed(0)+'h</strong>'
    +'</div>'
  +'</div>';
}

// ===================== BAR CHART =====================
function renderChart(b,ym){
  const dias=b.por_dia;if(!dias||!dias.length)return'<div class="empty">Sem lançamentos</div>';
  let max=0;dias.forEach(d=>{const t=(d.oper_total||0)+(d.manut_total||0);if(t>max)max=t});
  if(max===0)max=8;const topo=Math.ceil(max/4)*4||4;
  const gv=[topo,topo*.75,topo*.5,topo*.25,0];
  const gh=gv.map(v=>'<div class="gline" data-v="'+fmtNum(v)+'h"></div>').join("");
  const cols=dias.map((d,i)=>{
    const opPct=(d.oper_total/topo)*100,mPct=(d.manut_total/topo)*100;
    const dd=JSON.stringify(d).replace(/"/g,"&quot;");
    const lbl=ym==="ANUAL"?d.dia:d.dia.replace(/^0/,"");
    return'<div class="bar-col"><div class="bar-stack"><div class="bar-pair">'
      +'<div class="bar bar-op" style="height:'+opPct+'%;animation-delay:'+i*15+'ms" data-day="'+dd+'" data-kind="op"></div>'
      +'<div class="bar bar-manut" style="height:'+mPct+'%;animation-delay:'+(i*15+8)+'ms" data-day="'+dd+'" data-kind="manut"></div>'
      +'</div></div><div class="bar-label">'+lbl+'</div></div>';
  }).join("");
  const minW=Math.max(dias.length*36,600);
  return'<div class="chart-legend"><span class="legend-item"><span class="swatch op"></span> Operação</span><span class="legend-item"><span class="swatch manut"></span> Manutenção</span><span class="legend-item" style="margin-left:auto;color:var(--text-dim)">passe o mouse para detalhes</span></div>'
    +'<div class="chart-scroll"><div class="bar-chart" style="min-width:'+minW+'px;padding-left:42px"><div class="bar-grid">'+gh+'</div>'+cols+'</div></div>';
}

// ===================== BAR CHART (com filtro de datas e agrupamento) =====================
// Esta versão do gráfico de barras aplica filtragem por datas (startDate/endDate)
// definida no estado e agrupa períodos com mais de 31 entradas. Ela substitui
// a função renderChart tradicional durante a renderização da interface.
function renderChartFiltered(b, ym){
  let dias = b.por_dia;
  if(!dias || !dias.length) return '<div class="empty">Sem lançamentos</div>';
  // Construir array com data completa para cada entrada, para filtragem
  let df = dias.map(d => {
    let dateStr;
    if(ym !== 'ANUAL'){
      dateStr = ym + '-' + String(d.dia).padStart(2,'0');
    } else {
      if(String(d.dia).includes('-')){
        const parts = String(d.dia).split('-');
        const year = (DATA.meses && DATA.meses.length) ? DATA.meses[0].split('-')[0] : String(new Date().getFullYear());
        dateStr = year + '-' + String(parts[0]).padStart(2,'0') + '-' + String(parts[1]).padStart(2,'0');
      } else {
        const year = (DATA.meses && DATA.meses.length) ? DATA.meses[0].split('-')[0] : String(new Date().getFullYear());
        const month = ym.split('-')[1] || '01';
        dateStr = year + '-' + String(month).padStart(2,'0') + '-' + String(d.dia).padStart(2,'0');
      }
    }
    return Object.assign({}, d, {fullDate: dateStr});
  });
  // Filtrar por datas selecionadas no filtro de período
  if(state.startDate){
    df = df.filter(x => x.fullDate >= state.startDate);
  }
  if(state.endDate){
    df = df.filter(x => x.fullDate <= state.endDate);
  }
  if(!df.length) return '<div class="empty">Sem lançamentos no período selecionado</div>';
  // Agrupar caso exceda 31 entradas
  let grouped = df;
  if(df.length > 31){
    const segSize = Math.ceil(df.length / 31);
    grouped = [];
    for(let i=0; i < df.length; i += segSize){
      const slice = df.slice(i, i + segSize);
      const first = slice[0];
      const last  = slice[slice.length - 1];
      const g = {};
      g.dia = first.dia + '-' + last.dia;
      ALL_TIPOS.forEach(k => {
        g[k] = slice.reduce((sum,itm) => sum + (itm[k] || 0), 0);
      });
      g.oper_total  = slice.reduce((sum,itm) => sum + (itm.oper_total  || 0), 0);
      g.manut_total = slice.reduce((sum,itm) => sum + (itm.manut_total || 0), 0);
      grouped.push(g);
    }
  }
  let max = 0;
  grouped.forEach(d => {
    const t = (d.oper_total || 0) + (d.manut_total || 0);
    if(t > max) max = t;
  });
  if(max === 0) max = 8;
  const topo = Math.ceil(max / 4) * 4 || 4;
  const gv = [topo, topo * 0.75, topo * 0.5, topo * 0.25, 0];
  const gh = gv.map(v => '<div class="gline" data-v="'+fmtNum(v)+'h"></div>').join('');
  const cols = grouped.map((d,i) => {
    const opPct = (d.oper_total / topo) * 100;
    const mPct  = (d.manut_total / topo) * 100;
    const dd    = JSON.stringify(d).replace(/"/g,'&quot;');
    const lbl   = ym === 'ANUAL' ? d.dia : String(d.dia).replace(/^0/,'');
    return '<div class="bar-col"><div class="bar-stack"><div class="bar-pair">'
      + '<div class="bar bar-op" style="height:'+opPct+'%;animation-delay:'+i*15+'ms" data-day="'+dd+'" data-kind="op"></div>'
      + '<div class="bar bar-manut" style="height:'+mPct+'%;animation-delay:'+(i*15+8)+'ms" data-day="'+dd+'" data-kind="manut"></div>'
      + '</div></div><div class="bar-label">'+lbl+'</div></div>';
  }).join('');
  const minW = Math.max(grouped.length * 36, 600);
  return '<div class="chart-legend"><span class="legend-item"><span class="swatch op"></span> Operação</span><span class="legend-item"><span class="swatch manut"></span> Manutenção</span><span class="legend-item" style="margin-left:auto;color:var(--text-dim)">passe o mouse para detalhes</span></div>'
    + '<div class="chart-scroll"><div class="bar-chart" style="min-width:'+minW+'px;padding-left:42px"><div class="bar-grid">'+gh+'</div>'+cols+'</div></div>';
}

// ===================== OS LIST =====================
function renderOS(b){
  function formatOSCopy(lista){
    if(!lista||!lista.length) return '';
    return lista.map((n,i)=>i===0?String(n):',='+String(n)).join('');
  }
  function buildOSTip(lista, tipo){
    if(!lista||!lista.length) return tipo+': sem OS listadas';
    const det = (DATA.os_details)||{};
    const linhas = lista.slice(0,12).map(osn=>{
      const d = det[String(osn)] || {};
      const desc = d.desc||d.descricao||'—';
      const loc  = d.local||d.site||'—';
      const st   = d.status||d.situacao||'—';
      return '• OS '+osn+': '+desc+' | '+loc+' | '+st;
    });
    if(lista.length>12) linhas.push('... e mais '+(lista.length-12));
    return tipo+'\n'+linhas.join('\n');
  }
  const tipos=[
    {k:"OPER",...OPER_LABEL},
    {k:"CORR",...MANUT_LABELS.CORR},{k:"EM",...MANUT_LABELS.EM},
    {k:"PRED",...MANUT_LABELS.PRED},{k:"PREV",...MANUT_LABELS.PREV},
    {k:"SERV",...MANUT_LABELS.SERV},{k:"MODI",...MANUT_LABELS.MODI}
  ];
  const rows=tipos.map(t=>{
    const c=b.os_por_tipo[t.k]||0;
    if(!c) return "";
    const lista=(b.os_lists&&b.os_lists[t.k]&&Array.isArray(b.os_lists[t.k]))?b.os_lists[t.k]:[];
    const copyVal=lista.length?formatOSCopy(lista):t.k+':'+c+'OS';
    const copyLabel='Copiar OS de '+t.nome+' ('+c+' OS) — formato ,=';
    const tipText=buildOSTip(lista, t.k+' · '+t.nome);
    return '<div class="os-item" data-type="'+t.k+'">'
      +'<span class="dot" style="background:'+t.cor+'"></span>'
      +'<div class="label"><span>'+t.k+'</span><span class="full">'+t.nome+'</span></div>'
      +'<span class="count">'+c+'</span>'
      +(lista.length
        ?'<button class="os-tip-btn" title="'+tipText.replace(/"/g,"'").replace(/
/g,"&#10;")+'" '
          +'aria-label="Ver detalhes OS '+t.k+'" '
          +'style="appearance:none;border:1px solid var(--line);background:var(--surface-3);'
          +'color:var(--text-mute);cursor:pointer;padding:2px 7px;border-radius:5px;font-size:10px;'
          +'font-family:JetBrains Mono,monospace;margin-right:4px">'
          +'OS ℹ'
        +'</button>'
        :''
      )
      +'<button class="copy-btn" data-copy="'+copyVal.replace(/"/g,"&quot;")+'" '
        +'aria-label="'+copyLabel+'" title="'+copyLabel+'">📋</button>'
    +'</div>';
  }).join("")||'<div class="empty">Nenhuma OS</div>';
  return '<div class="os-summary"><span class="label">Total de OS</span><span class="val">'+b.total_os+'</span>'
    +'<button class="copy-btn" style="margin-left:auto" '
      +'data-copy="'+( ()=>{
        // copiar todas as OS do período
        return ''; // placeholder — será preenchido no render
      } )()+'" '
    +'aria-label="Copiar todas as OS" title="Copiar todas as OS do período">📋 Todas</button>'
    +'</div><div class="os-list">'+rows+'</div>';
}


// ===================== BREAKDOWN =====================
function renderBreakdown(b){
  // Formatar lista de OS para cópia: 321321,=324321,=...
  function formatOSCopy(lista){
    if(!lista||!lista.length) return '';
    return lista.map((n,i)=>i===0?String(n):',='+String(n)).join('');
  }
  // Construir tooltip rich de OS
  function buildOSTip(lista, tipo){
    if(!lista||!lista.length) return tipo+': sem OS listadas';
    const det = (DATA.os_details)||{};
    const linhas = lista.slice(0,15).map(osn=>{
      const d = det[String(osn)] || {};
      const desc = d.desc||d.descricao||'—';
      const loc  = d.local||d.site||'—';
      const st   = d.status||d.situacao||'—';
      return '• '+osn+' | '+desc+' | '+loc+' | '+st;
    });
    if(lista.length>15) linhas.push('... e mais '+(lista.length-15)+' OS');
    return tipo+' ('+lista.length+' OS):\n'+linhas.join('\n');
  }

  return '<div class="breakdown">' + TIPOS_MANUT.map(k => {
    const v = b.tipos[k] || 0;
    if(!v) return '';
    const m = MANUT_LABELS[k];
    // Pegar lista de OS deste tipo
    const lista = (b.os_lists && b.os_lists[k]) ? b.os_lists[k] : [];
    const copyVal = lista.length ? formatOSCopy(lista) : k+':'+fmtNum(v)+'h';
    const copyLabel = lista.length
      ? 'Copiar '+lista.length+' OS de '+m.nome+' (formato ,=)'
      : 'Copiar '+k;
    const tipText = buildOSTip(lista, k+' · '+m.nome);
    // Contar OS deste tipo
    const nOS = (b.os_por_tipo && b.os_por_tipo[k]) ? b.os_por_tipo[k] : 0;

    return '<div class="bd-row" style="position:relative">'
      +'<span class="swatch" style="background:'+m.cor+'"></span>'
      +'<div class="info">'
        +'<span class="name">'+k+'</span>'
        +'<span class="full">'+m.nome+(nOS?' · '+nOS+' OS':'')+'</span>'
      +'</div>'
      +'<span class="v">'+fmtNum(v)+'h</span>'
      // Badge tooltip de OS — clicável para ver detalhes
      +(nOS
        ?'<button class="os-tip-btn" aria-label="Ver detalhes OS '+k+'" '
          +'title="'+tipText.replace(/"/g,"'").replace(/
/g,"&#10;")+'" '
          +'style="appearance:none;border:1px solid var(--line);background:var(--surface-3);'
          +'color:var(--text-mute);cursor:pointer;padding:2px 7px;border-radius:5px;font-size:10px;'
          +'font-family:JetBrains Mono,monospace;margin-right:4px;transition:all .2s"'
          +' onmouseenter="this.style.borderColor='var(--op)';this.style.color='var(--op)'"'
          +' onmouseleave="this.style.borderColor='var(--line)';this.style.color='var(--text-mute)'">'
          +nOS+' OS'
        +'</button>'
        :''
      )
      // Botão copiar com ícone
      +'<button class="copy-btn" data-copy="'+copyVal.replace(/"/g,"&quot;")+'" '
        +'aria-label="'+copyLabel+'" '
        +'title="'+copyLabel+'">📋</button>'
    +'</div>';
  }).filter(Boolean).join('') + '</div>';
}


// ===================== GAUGE CARD =====================
// Renderiza um cartão com um velocímetro/rosca representando as horas lançadas
// no mês em comparação com a carga teórica (8h × dias trabalhados). As
// porções correspondem às horas de operação, horas de manutenção e horas
// restantes até a carga teórica. O gráfico é desenhado com Chart.js.
function renderGaugeCard(b){
  const tt='Velocímetro SVG: arco azul = OPER, arco roxo = Manutenção. '
    +'Ponteiro branco = total lançado. Linha tracejada = meta de horas úteis (dias×7h). '
    +'100% = carga nominal 8h×dias.';
  return '<div class="card" style="margin-top:16px">'
    +'<h3>Resumo de horas no mês '
    +'<span style="display:inline-flex;align-items:center;justify-content:center;'
    +'width:18px;height:18px;border-radius:50%;background:var(--surface-3);'
    +'color:var(--text-mute);font-size:10px;font-weight:700;margin-left:8px;'
    +'cursor:help;vertical-align:middle" title="'+tt+'">?</span></h3>'
    +'<div class="card-sub">Horas lançadas vs carga teórica (8h × dias trabalhados)</div>'
    +'<div class="gauge-svg-wrap">'
      +'<svg id="gaugeSVG" viewBox="0 0 260 150" width="100%" style="max-width:340px" role="img" aria-label="Velocímetro de horas">'
        +'<defs>'
          +'<linearGradient id="gOper" x1="0%" y1="0%" x2="100%" y2="0%">'
            +'<stop offset="0%" stop-color="#60a5fa"/>'
            +'<stop offset="100%" stop-color="#3b82f6"/>'
          +'</linearGradient>'
          +'<linearGradient id="gMaint" x1="0%" y1="0%" x2="100%" y2="0%">'
            +'<stop offset="0%" stop-color="#a855f7"/>'
            +'<stop offset="100%" stop-color="#7c3aed"/>'
          +'</linearGradient>'
        +'</defs>'
        // trilha de fundo
        +'<path id="gTrack" fill="none" stroke="#1c2530" stroke-width="26" stroke-linecap="round"/>'
        // arco operação
        +'<path id="gOp"    fill="none" stroke="url(#gOper)"  stroke-width="26" stroke-linecap="butt"/>'
        // arco manutenção
        +'<path id="gMn"    fill="none" stroke="url(#gMaint)" stroke-width="26" stroke-linecap="butt"/>'
        // marcador de horas úteis (linha tracejada)
        +'<line id="gMark" stroke="#9aa6b6" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>'
        // agulha (ponteiro)
        +'<line id="gNeedle" stroke="#e7ecf3" stroke-width="2.5" stroke-linecap="round"/>'
        // pino central
        +'<circle id="gPin" r="6" fill="#e7ecf3"/>'
        // textos
        +'<text id="gPct"   x="130" y="112" text-anchor="middle" font-family="Outfit,sans-serif" font-size="22" font-weight="700" fill="#e7ecf3">--%</text>'
        +'<text id="gTotal" x="130" y="130" text-anchor="middle" font-family="Inter Tight,sans-serif" font-size="11" fill="#6a7689">0h / 0h</text>'
        +'<text x="16"  y="148" font-family="JetBrains Mono,monospace" font-size="9" fill="#6a7689">0h</text>'
        +'<text id="gMax" x="244" y="148" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#6a7689">0h</text>'
      +'</svg>'
      +'<div class="gauge-legend">'
        +'<span class="gauge-legend-item"><span class="gauge-legend-dot" style="background:#60a5fa"></span><span id="gLegOp">OPER — 0h</span></span>'
        +'<span class="gauge-legend-item"><span class="gauge-legend-dot" style="background:#a855f7"></span><span id="gLegMn">MANUT — 0h</span></span>'
        +'<span class="gauge-legend-item"><span class="gauge-legend-dot" style="background:#9aa6b6;opacity:.6;border:1px dashed #9aa6b6"></span><span>Meta útil (×7h)</span></span>'
      +'</div>'
    +'</div>'
  +'</div>';
}

.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-mark{width:38px;height:38px;border-radius:12px;background:conic-gradient(from 200deg at 50% 50%,var(--op) 0deg,var(--maint) 140deg,var(--op) 360deg);position:relative;box-shadow:0 4px 14px rgba(34,211,238,.25),0 4px 14px rgba(245,158,11,.18);flex-shrink:0}
.brand-mark::after{content:"";position:absolute;inset:5px;border-radius:8px;background:var(--surface-1)}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand-text .t{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em}
.brand-text .s{font-size:11px;color:var(--text-mute);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.appbar-spacer{flex:1}
.appbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Refresh btn */
.btn-refresh{
  appearance:none;border:1px solid var(--line-strong);background:var(--surface-2);color:var(--text);
  font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:600;
  padding:9px 16px;border-radius:999px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:all .25s ease;white-space:nowrap;
}
.btn-refresh:hover{background:var(--surface-3);border-color:var(--op);color:var(--op)}
.btn-refresh.loading{pointer-events:none;opacity:.7}
.btn-refresh.loading .ico{animation:spin .8s linear infinite}
.btn-refresh.done{border-color:rgba(34,197,94,.4);color:#22c55e}
.btn-refresh .ico{width:16px;height:16px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-refresh .status{font-size:10px;color:var(--text-dim);margin-left:2px}

.op-filter{display:flex;gap:6px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px}
.op-filter select{appearance:none;background:transparent;color:var(--text);border:0;outline:0;font-family:inherit;font-size:13px;font-weight:500;padding:8px 28px 8px 14px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%239aa6b6' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 10px center}
.op-filter select option{background:var(--surface-2);color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;background:var(--surface-3);border:1px solid var(--line-strong);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:500;box-shadow:var(--shadow-2);opacity:0;transition:all .4s cubic-bezier(.2,.8,.2,1);pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
.toast.success{border-color:rgba(34,197,94,.4);color:#86efac}

/* ===== Tabs ===== */
.tabs-wrap{max-width:1400px;margin:0 auto;padding:18px 22px 0}
.tabs{display:flex;gap:8px;flex-wrap:wrap;background:var(--surface-1);border:1px solid var(--line);padding:6px;border-radius:16px;width:fit-content;max-width:100%}
.tab{appearance:none;border:0;background:transparent;color:var(--text-mute);font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;letter-spacing:.02em;padding:10px 18px;border-radius:11px;cursor:pointer;transition:all .25s ease;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1}
.tab .tab-sub{font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{background:linear-gradient(180deg,rgba(34,211,238,.18),rgba(34,211,238,.06));color:var(--text);box-shadow:0 0 0 1px rgba(34,211,238,.35) inset,0 6px 18px rgba(34,211,238,.10)}
.tab.active .tab-sub{color:var(--op)}
.tab.tab-anual{background:linear-gradient(180deg,rgba(245,158,11,.16),rgba(34,211,238,.10))}
.tab.tab-anual.active{background:linear-gradient(180deg,rgba(245,158,11,.28),rgba(34,211,238,.18));box-shadow:0 0 0 1px rgba(245,158,11,.35) inset,0 6px 18px rgba(245,158,11,.12)}
.tab.tab-new{animation:tabPulse 2s ease-in-out 3}
@keyframes tabPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(34,197,94,.5),0 0 20px rgba(34,197,94,.15)}}

/* ===== Main ===== */
.main{max-width:1400px;margin:0 auto;padding:18px 22px 60px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:14px 4px 14px;flex-wrap:wrap}
.section-head h2{font-family:'Outfit',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.015em;margin:0}
.section-head .sub{font-size:13px;color:var(--text-mute)}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);padding:6px 12px;border-radius:999px;font-size:12px;color:var(--text-mute);font-weight:500}
.pill .dot{width:7px;height:7px;border-radius:99px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:8px}
.kpi{position:relative;overflow:hidden;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px 18px 16px;box-shadow:var(--shadow-1);transition:transform .35s cubic-bezier(.2,.8,.2,1),border-color .25s;animation:kpiIn .55s cubic-bezier(.2,.8,.2,1) both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.07s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.17s}.kpi:nth-child(5){animation-delay:.22s}.kpi:nth-child(6){animation-delay:.27s}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-strong)}
@keyframes kpiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi .label{font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.kpi .value{font-family:'Outfit',sans-serif;font-weight:700;font-size:34px;letter-spacing:-.025em;margin-top:6px;line-height:1;display:flex;align-items:baseline;gap:6px}
.kpi .value .unit{font-size:13px;color:var(--text-mute);font-weight:500;letter-spacing:0}
.kpi .meta{font-size:12px;color:var(--text-dim);margin-top:6px}
.kpi .badge{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface-3);font-size:14px}
.kpi.kpi-op .badge{background:var(--op-soft);color:var(--op)}.kpi.kpi-manut .badge{background:var(--maint-soft);color:var(--maint)}
.kpi.kpi-op .value{color:var(--op)}.kpi.kpi-manut .value{color:var(--maint)}
.kpi.kpi-op::after,.kpi.kpi-manut::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px}
.kpi.kpi-op::after{background:linear-gradient(90deg,var(--op),transparent)}.kpi.kpi-manut::after{background:linear-gradient(90deg,var(--maint),transparent)}

/* Cards */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:18px}
@media(max-width:980px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-1)}
.card h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.01em;margin:0 0 4px}
.card .card-sub{font-size:12px;color:var(--text-mute);margin-bottom:16px}

/* Chart */
.chart-legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-mute)}
.legend-item .swatch{width:12px;height:12px;border-radius:3px;display:inline-block}
.legend-item .swatch.op{background:var(--op)}.legend-item .swatch.manut{background:var(--maint)}
.chart-scroll{overflow-x:auto;overflow-y:visible;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.chart-scroll::-webkit-scrollbar{height:8px}.chart-scroll::-webkit-scrollbar-track{background:transparent}.chart-scroll::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:300px;padding:14px 4px 30px;position:relative;min-width:100%}
.bar-grid{position:absolute;left:36px;right:0;top:14px;bottom:30px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.bar-grid .gline{height:1px;background:var(--line);position:relative}
.bar-grid .gline::before{content:attr(data-v);position:absolute;left:-32px;top:-7px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.bar-col{flex:1 1 0;min-width:22px;max-width:60px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;height:100%;padding-left:2px;padding-right:2px}
.bar-stack{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.bar-pair{display:flex;gap:3px;width:100%;flex:1;align-items:flex-end}
.bar{flex:1;border-radius:6px 6px 2px 2px;position:relative;cursor:pointer;transition:filter .15s ease,transform .15s ease;min-height:0;animation:barRise .6s cubic-bezier(.2,.8,.2,1) both}
.bar:hover{filter:brightness(1.18);transform:translateY(-1px)}
.bar.bar-op{background:linear-gradient(180deg,var(--op),var(--op-2));box-shadow:0 0 12px rgba(34,211,238,.25)}
.bar.bar-manut{background:linear-gradient(180deg,var(--m-prev),var(--m-modi));box-shadow:0 0 12px rgba(245,158,11,.25)}
@keyframes barRise{from{opacity:0;transform:scaleY(.2);transform-origin:bottom}to{opacity:1;transform:scaleY(1)}}
.bar-label{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* Tooltip */
.tooltip{position:fixed;z-index:80;background:rgba(17,22,29,.96);backdrop-filter:blur(10px);border:1px solid var(--line-strong);border-radius:14px;padding:12px 14px;min-width:240px;box-shadow:var(--shadow-2);color:var(--text);font-size:12px;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s ease,transform .12s ease}
.tooltip.show{opacity:1;transform:translateY(0)}
.tt-head{display:flex;justify-content:space-between;align-items:baseline;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line)}

.empty{text-align:center;padding:50px 20px;color:var(--text-dim);font-size:13px}

<script>
(function(){
"use strict";

// ===================== CONSTANTS =====================
const TIPOS_OPER=["OPER"],TIPOS_MANUT=["CORR","EM","PRED","PREV","SERV","MODI"],ALL_TIPOS=[...TIPOS_OPER,...TIPOS_MANUT];
const MANUT_LABELS={CORR:{nome:"Corretiva",cor:"var(--m-corr)"},EM:{nome:"Emergencial",cor:"var(--m-em)"},PRED:{nome:"Preditiva",cor:"var(--m-pred)"},PREV:{nome:"Preventiva",cor:"var(--m-prev)"},SERV:{nome:"Serviços",cor:"var(--m-serv)"},MODI:{nome:"Modificativa",cor:"var(--m-modi)"}};
const OPER_LABEL={nome:"Operacional",cor:"var(--op)"};
const MES_NOMES={"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};

// ===================== STATE =====================
// Inicializa com dados embutidos (fallback)
let DATA=JSON.parse(document.getElementById("data-blob").textContent);
// Estado global inclui período de data para filtragem (startDate/endDate)
const state={
  mes: DATA.meses[DATA.meses.length-1],
  operador: "_ALL",
  startDate: null,
  endDate: null
};

  // Personalização do título/subtítulo da dashboard. Caso o dataset inclua
  // campos `titulo` ou `subtitulo`, eles serão utilizados; caso contrário,
  // serão aplicados valores padrão alinhados à Turma B.
  const DASHBOARD_TITLE = (DATA.titulo || 'Painel Operacional – Turma B');
  const DASHBOARD_SUBTITLE = (DATA.subtitulo || 'Operação · Manutenção · Ordens de Serviço');
  // Atualiza o texto da marca no cabeçalho
  const brandTitleEl = document.querySelector('.brand-text .t');
  const brandSubEl = document.querySelector('.brand-text .s');
  if (brandTitleEl) brandTitleEl.textContent = DASHBOARD_TITLE;
  if (brandSubEl) brandSubEl.textContent = DASHBOARD_SUBTITLE;

// ===================== HELPERS =====================
function fmtH(v){if(!v)return"0h";const h=Math.floor(v),m=Math.round((v-h)*60);return m===0?h+"h":h+"h "+String(m).padStart(2,"0")+"m"}
function fmtNum(v,d){return Number(v||0).toFixed(d||0).replace(".",",")}
function formatMesLabel(ym){if(ym==="ANUAL")return{top:"Anual",sub:"Consolidado"};const[a,m]=ym.split("-");return{top:MES_NOMES[m]||m,sub:a}}
function $(id){return document.getElementById(id)}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg,type){
  const t=$("toast");t.textContent=msg;t.className="toast "+type+" show";
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),4000);
}

// ===================== REFRESH =====================
async function refreshData(){
  const btn=$("btnRefresh");
  btn.classList.add("loading");
  btn.querySelector(".txt").textContent="Buscando…";
  try{
    // Detectar base URL do repositório (funciona no GitHub Pages)
    const base=window.location.href.replace(/\/[^/]*$/,"/");
    const manifestURL=base+"data/index.json?_="+Date.now();
    const res=await fetch(manifestURL);
    if(!res.ok) throw new Error("Manifesto não encontrado ("+res.status+")");
    const manifest=await res.json();

    // Quais meses novos existem?
    const currentMeses=new Set(DATA.meses);
    const allRemote=manifest.meses||[];
    const newMeses=allRemote.filter(m=>!currentMeses.has(m));

    // Baixar os JSONs de todos os meses remotos (para garantir dados atualizados)
    let updated=false;
    for(const ym of allRemote){
      try{
        const mRes=await fetch(base+"data/"+ym+".json?_="+Date.now());
        if(!mRes.ok) continue;
        const mData=await mRes.json();
        DATA.dados[ym]=mData.dados;
        updated=true;
      }catch(e){console.warn("Erro ao baixar "+ym+".json",e)}
    }

    // Atualizar ANUAL com o manifesto
    if(manifest.anual){
      DATA.dados["ANUAL"]=manifest.anual;
    }

    // Atualizar lista de meses e operadores
    DATA.meses=allRemote;
    if(manifest.operadores&&manifest.operadores.length) DATA.operadores=manifest.operadores;

    // Rebuild UI
    buildFilter();
    buildTabs(newMeses);
    if(!DATA.dados[state.mes]){state.mes=DATA.meses[DATA.meses.length-1]}
    render();

    if(newMeses.length>0){
      showToast("✓ "+newMeses.length+" novo(s) mês(es) encontrado(s): "+newMeses.join(", "),"success");
      btn.classList.add("done");
      btn.querySelector(".txt").textContent="Atualizado ✓";
    }else if(updated){
      showToast("✓ Dados atualizados com sucesso","success");
      btn.classList.add("done");
      btn.querySelector(".txt").textContent="Atualizado ✓";
    }else{
      showToast("Nenhum mês novo encontrado","");
      btn.querySelector(".txt").textContent="Atualizar";
    }
  }catch(e){
    console.error("Refresh error:",e);
    showToast("Sem dados remotos — usando dados embutidos","error");
    btn.querySelector(".txt").textContent="Atualizar";
  }finally{
    btn.classList.remove("loading");
    setTimeout(()=>{btn.classList.remove("done");btn.querySelector(".txt").textContent="Atualizar"},5000);
  }
}

$("btnRefresh").addEventListener("click",refreshData);

// ===================== TABS =====================
function buildTabs(highlightNew){
  const root=$("tabs");root.innerHTML="";
  const items=[...DATA.meses,"ANUAL"];
  const newSet=new Set(highlightNew||[]);
  items.forEach(ym=>{
    const lbl=formatMesLabel(ym);
    const b=document.createElement("button");
    let cls="tab";
    if(ym==="ANUAL") cls+=" tab-anual";
    if(ym===state.mes) cls+=" active";
    if(newSet.has(ym)) cls+=" tab-new";
    b.className=cls;b.dataset.ym=ym;
    b.innerHTML='<span>'+lbl.top+'</span><span class="tab-sub">'+lbl.sub+'</span>';
    b.addEventListener("click",()=>{state.mes=ym;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.ym===ym));render()});
    root.appendChild(b);
  });
}

// ===================== OPERATOR FILTER =====================
function buildFilter(){
  const sel=$("operFilter");
  const current=sel.value||"_ALL";
  sel.innerHTML='<option value="_ALL">Todos os operadores</option>';
  (DATA.operadores||[]).forEach(op=>{
    const o=document.createElement("option");o.value=op;o.textContent=op.replace(/\./g," ");
    sel.appendChild(o);
  });
  sel.value=current;
  // Rebind (safe to call multiple times since we replace innerHTML)
  sel.onchange=function(e){state.operador=e.target.value;render()};
}

// ===================== RENDER KPIs =====================
function renderKPIs(b){
  const dias=b.dias_trabalhados,ht=dias*8,hu=dias*7;
  // HH Programado: 7h por operador por dia com lançamento (= dias_trabalhados × 7)
  // Quando _ALL: soma todos os operadores, então hh_prog = dias × 7 (por operador individual)
  // Para _ALL: hh_prog = dias_trabalhados × 7 (planejado total = 7h/op × 1 op equivalente por dia)
  // Conforme regra: cada dia com hora lançada = 7h manutenção planejada
  const hhProg = dias * 7;
  // HH Apontado = soma de TODOS os tipos (OPER + MODI + PREV + CORR + EM + PRED + SERV)
  const hhApt = b.horas_total || 0;
  const pctHH = hhProg > 0 ? Math.min(Math.round((hhApt/hhProg)*100), 999) : 0;
  const corPct = pctHH >= 100 ? '#22c55e' : (pctHH >= 80 ? 'var(--maint)' : '#ef4444');
  return '<div class="kpis">'
    +'<div class="kpi kpi-op"><div class="badge">⚙</div><div class="label">Horas operacionais</div><div class="value">'+fmtNum(b.horas_oper)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_oper)+' totais em OPER</div></div>'
    +'<div class="kpi kpi-manut"><div class="badge">🛠</div><div class="label">Horas em manutenção</div><div class="value">'+fmtNum(b.horas_manut)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_manut)+' · 6 tipos combinados</div></div>'
    +'<div class="kpi"><div class="badge">📅</div><div class="label">Dias trabalhados</div><div class="value">'+dias+'<span class="unit">dias</span></div><div class="meta">com lançamento de horas</div></div>'
    +'<div class="kpi"><div class="badge">⏱</div><div class="label">Horas totais (×8h)</div><div class="value">'+ht+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 8h · 4 operadores</div></div>'
    +'<div class="kpi"><div class="badge">🕖</div><div class="label">Horas úteis (×7h)</div><div class="value">'+hu+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 7h previstas</div></div>'
    +'<div class="kpi"><div class="badge">📋</div><div class="label">Ordens de serviço</div><div class="value">'+b.total_os+'<span class="unit">OS</span></div><div class="meta">distintas no período</div></div>'
    +'</div>';
}

  return '<div class="card" style="margin-top:16px">'

// ===================== BAR CHART (com filtro de datas e agrupamento) =====================
// Esta versão do gráfico de barras aplica filtragem por datas (startDate/endDate)
// definida no estado e agrupa períodos com mais de 31 entradas. Ela substitui
// a função renderChart tradicional durante a renderização da interface.
function renderChartFiltered(b, ym){
  let dias = b.por_dia;
  if(!dias || !dias.length) return '<div class="empty">Sem lançamentos</div>';
  // Construir array com data completa para cada entrada, para filtragem
  let df = dias.map(d => {
    let dateStr;
    if(ym !== 'ANUAL'){
      dateStr = ym + '-' + String(d.dia).padStart(2,'0');
    } else {
      if(String(d.dia).includes('-')){
        const parts = String(d.dia).split('-');
        const year = (DATA.meses && DATA.meses.length) ? DATA.meses[0].split('-')[0] : String(new Date().getFullYear());
        dateStr = year + '-' + String(parts[0]).padStart(2,'0') + '-' + String(parts[1]).padStart(2,'0');
      } else {
        const year = (DATA.meses && DATA.meses.length) ? DATA.meses[0].split('-')[0] : String(new Date().getFullYear());
        const month = ym.split('-')[1] || '01';
        dateStr = year + '-' + String(month).padStart(2,'0') + '-' + String(d.dia).padStart(2,'0');
      }
    }
    return Object.assign({}, d, {fullDate: dateStr});
  });
  // Filtrar por datas selecionadas no filtro de período
  if(state.startDate){
    df = df.filter(x => x.fullDate >= state.startDate);
  }
  if(state.endDate){
    df = df.filter(x => x.fullDate <= state.endDate);
  }
  if(!df.length) return '<div class="empty">Sem lançamentos no período selecionado</div>';
  // Agrupar caso exceda 31 entradas
  let grouped = df;
  if(df.length > 31){
    const segSize = Math.ceil(df.length / 31);
    grouped = [];
    for(let i=0; i < df.length; i += segSize){
      const slice = df.slice(i, i + segSize);
      const first = slice[0];
      const last  = slice[slice.length - 1];
      const g = {};
      g.dia = first.dia + '-' + last.dia;
      ALL_TIPOS.forEach(k => {
        g[k] = slice.reduce((sum,itm) => sum + (itm[k] || 0), 0);
      });
      g.oper_total  = slice.reduce((sum,itm) => sum + (itm.oper_total  || 0), 0);
      g.manut_total = slice.reduce((sum,itm) => sum + (itm.manut_total || 0), 0);
      grouped.push(g);
    }
  }
  let max = 0;
  grouped.forEach(d => {
    const t = (d.oper_total || 0) + (d.manut_total || 0);
    if(t > max) max = t;
  });
  if(max === 0) max = 8;
  const topo = Math.ceil(max / 4) * 4 || 4;
  const gv = [topo, topo * 0.75, topo * 0.5, topo * 0.25, 0];
  const gh = gv.map(v => '<div class="gline" data-v="'+fmtNum(v)+'h"></div>').join('');
  const cols = grouped.map((d,i) => {
    const opPct = (d.oper_total / topo) * 100;
    const mPct  = (d.manut_total / topo) * 100;
    const dd    = JSON.stringify(d).replace(/"/g,'&quot;');
    const lbl   = ym === 'ANUAL' ? d.dia : String(d.dia).replace(/^0/,'');
    return '<div class="bar-col"><div class="bar-stack"><div class="bar-pair">'
      + '<div class="bar bar-op" style="height:'+opPct+'%;animation-delay:'+i*15+'ms" data-day="'+dd+'" data-kind="op"></div>'
      + '<div class="bar bar-manut" style="height:'+mPct+'%;animation-delay:'+(i*15+8)+'ms" data-day="'+dd+'" data-kind="manut"></div>'
      + '</div></div><div class="bar-label">'+lbl+'</div></div>';
  }).join('');
  const minW = Math.max(grouped.length * 36, 600);
  return '<div class="chart-legend"><span class="legend-item"><span class="swatch op"></span> Operação</span><span class="legend-item"><span class="swatch manut"></span> Manutenção</span><span class="legend-item" style="margin-left:auto;color:var(--text-dim)">passe o mouse para detalhes</span></div>'
    + '<div class="chart-scroll"><div class="bar-chart" style="min-width:'+minW+'px;padding-left:42px"><div class="bar-grid">'+gh+'</div>'+cols+'</div></div>';
}
